services:
  - type: web
    name: sovereign
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false